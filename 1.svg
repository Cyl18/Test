<svg width="600" height="40" viewBox="0 0 600 40" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      fill: currentColor;
    }
    .title {
      font-size: 36px;
      font-weight: 600;
    }
    .bot {
      opacity: 0.6;
      font-weight: 500;
    }
    .icon {
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      opacity: 0.7;
    }
  </style>

  <!-- 小机器人（极简） -->
  <g class="icon" transform="translate(210,19)">
    <!-- 头 -->
    <rect x="-10" y="-8" width="20" height="16" rx="4"/>
    <!-- 眼睛 -->
    <circle cx="-4" cy="0" r="1.5"/>
    <circle cx="4" cy="0" r="1.5"/>
    <!-- 天线 -->
    <line x1="0" y1="-8" x2="0" y2="-14"/>
    <circle cx="0" cy="-16" r="1.5"/>
  </g>

  <!-- 标题 -->
  <text x="55%" y="45%" dominant-baseline="middle" text-anchor="middle" class="title">
    <tspan>CFPA</tspan>
    <tspan dx="1" class="bot">Bot</tspan>
  </text>
</svg>
